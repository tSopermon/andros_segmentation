# Configuration for creating balanced dataset splits
# Raw dataset containing Image and Mask subdirectories (or flat if configurable)
SOURCE_PATH: "/home/tsopermon/Desktop/DeepGlobe_2018/train"
# Where the train, val, test subsets will be copied
OUTPUT_PATH: "/home/tsopermon/Desktop/DeepGlobe_2018/deepglobe_balanced"

IMAGE_SUBDIR: "image"
MASK_SUBDIR: "mask"

SPLIT_RATIOS:
  train: 0.70
  val: 0.15
  test: 0.15

# Suffixes for filename matching (e.g. "_image", "_mask")
IMAGE_SUFFIX: "_sat"
MASK_SUFFIX: "_mask"

# Optional: Set this to false to scan image by image if all masks aren't mapped
# Or you can let the script auto-detect all possible classes.
