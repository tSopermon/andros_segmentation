DATASET_PATH: "/home/tsopermon/Documents/Thesis Research/Andros Dataset-20251220T140551Z-1-001/Andros Dataset/Andros_Dataset_Balanced_256"
# Set to 'true' if the dataset already contains a 'val/' folder. If 'true', K_FOLDS will be forced to 1.
PRE_SPLIT_DATASET: true
BATCH_SIZE: 8
MAX_EPOCHS: 200
LEARNING_RATE: 0.0001
LR_DECAY_GAMMA: 0.95
IMAGE_SIZE: 256
NUM_WORKERS: 0
USE_AUGMENTATION: true
PATIENCE: 50
MIN_EPOCHS: 20
MIN_DELTA: 0.0001
LR_PATIENCE_THRESHOLD: 0.5
LR_PATIENCE_SCALE: 1.5
BACKBONE: se_resnext50_32x4d # se_resnext50_32x4d: imagenet
LOGGING_LEVEL: INFO
# K-fold cross-validation: number of folds to use during training (1 = no k-fold)
K_FOLDS: 1
# If true, ensemble fold checkpoints for final evaluation
ENSEMBLE: false 
# Encoder weights to use for backbones (null/None to disable pretrained weights)
ENCODER_WEIGHTS: imagenet
# When true, generate masks for train/val/test (not just test)
GENERATE_FOR_ALL_SETS: true
# When true, also include low-resolution images found in the dataset 'lowres' folder
INCLUDE_LOWRES: false
# When true, include / enable the original-paper U-Net in runs
USE_UNET_ORIGINAL: false
# Enable original DeepLab variants (disabled by default). Set to true to include them.
USE_DEEPLABV1_ORIGINAL: false
USE_DEEPLABV2_ORIGINAL: false
USE_DEEPLABV3_ORIGINAL: false
USE_MAXVIT_UNET: false
# Model selection mode: one of `standard`, `originals`, or `all`.
# - `standard`: use the standard SMP-backed models (DeepLabV3, DeepLabV3Plus, UNet, UNetPlusPlus).
# - `originals`: use only original-paper and custom implementations (`UNet_original`, `DeepLabV1_original`, `DeepLabV2_original`, `DeepLabV3_original`, `MaxViTSmallUNet`).
# - `all`: train/evaluate both standard and original implementations.
MODEL_SET: standard
# Optional subset of standard models to include when MODEL_SET is `standard` or `all`.
# Omit or set to [] to include all standard models.
# Valid names: DeepLabV3, DeepLabV3Plus, UNet, UNetPlusPlus
STANDARD_MODELS: ['UNetPlusPlus']
# Loss function: 'CrossEntropy', 'Dice', 'Focal', 'DiceBCE' (Dice + CrossEntropy), or 'DiceFocal'
LOSS_FUNCTION: 'DiceFocal'
DICE_WEIGHT: 1.0
FOCAL_WEIGHT: 1.0

# -----------------------------------------------------------------------------
# Transfer Learning / Fine-Tuning
# -----------------------------------------------------------------------------
# When true, initialize models with weights from a pretrained checkpoint.
TRANSFER_LEARNING: true
# Directory where pretrained checkpoints are located. Checkpoints should be named <model_name>_best.pth
PRETRAINED_CHECKPOINT_DIR: 'checkpoints/'
# Custom suffix for transfer learning (e.g., '_pretrained.pth' for MAE weights, defaults to '_best.pth')
PRETRAINED_WEIGHT_SUFFIX: '_best.pth'
# When true, freeze the encoder (downsampling path) weights during training.
FREEZE_ENCODER: false

# -----------------------------------------------------------------------------
# Self-Training / Pseudo-Labeling
# -----------------------------------------------------------------------------
SELF_TRAINING: true
UNLABELED_IMG_PATH: '/home/tsopermon/Desktop/Scraped Andros (KtimaNet)/Processed Dataset/ktimatologio_all_patches/train_256'
PSEUDO_LABEL_THRESHOLD: 0.90
IGNORE_INDEX: -1

# -----------------------------------------------------------------------------
# Pre-training / Self-Predictive Learning
# -----------------------------------------------------------------------------
PRETRAIN_EPOCHS: 100
MASK_RATIO: 0.75
PATCH_SIZE: 16
# Epoch to transition from random mask to object-centric masking
OBJECT_CENTRIC_EPOCH: 50
